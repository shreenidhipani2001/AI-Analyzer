services:
  - type: web
    name: mf-faq-backend
    env: python
    pythonVersion: 3.11.0
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
